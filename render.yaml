services:
  - type: web
    name: telegram-prompter-bot
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: python bot.py
    envVars:
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: PROMPT_TIME
        value: "09:00"
      - key: TIMEZONE
        value: "UTC"
    plan: free
